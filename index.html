<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Kiran & Mounika | Royal Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&family=Parisienne&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-gold: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            --deep-maroon: #4A0404;
            --text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Montserrat', sans-serif; background: #0a0a0a;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        /* Entry Gate - Split Screen */
        #entry-gate {
            display: flex; width: 100%; height: 100vh;
            position: fixed; z-index: 1000;
            transition: transform 1.3s cubic-bezier(1, 0, 0, 1);
        }

        .side {
            width: 50%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            position: relative; overflow: hidden;
        }

        .groom-side { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)), 
            url('https://i.postimg.cc/xqDj4NJr/Whats-App-Image-2026-04-14-at-9-56-48-PM.jpg') center/cover; 
            border-right: 2px solid #bf953f; 
        }
        .bride-side { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)), 
            url('https://i.postimg.cc/grFcTLw1/Whats-App-Image-2026-04-14-at-9-56-49-PM-(1).jpg') center/cover; 
        }

        .side h2 { 
            font-family: 'Pinyon Script', cursive; font-size: 5.5rem; 
            color: #fff; text-shadow: var(--text-shadow); margin: 0; 
            transition: 0.5s;
        }
        .side:hover h2 { transform: scale(1.1); color: #fcf6ba; }
        
        .side p { 
            font-family: 'Cinzel', serif; color: #fcf6ba; font-weight: bold; 
            letter-spacing: 5px; border: 1px solid #bf953f;
            padding: 10px 25px; border-radius: 2px; background: rgba(0,0,0,0.4);
        }

        /* Main Content Section */
        #main-content {
            display: none; opacity: 0; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://i.postimg.cc/4nk4SHKr/Whats-App-Image-2026-04-15-at-10-30-15-PM.jpg') fixed center/cover;
            backdrop-filter: blur(12px); padding-bottom: 100px; color: #fff;
        }

        .header-box { padding: 80px 20px; animation: fadeIn 2s ease; }
        .header-box h1 { 
            font-family: 'Pinyon Script', cursive; font-size: 7rem; 
            background: var(--royal-gold); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; margin: 0;
            filter: drop-shadow(0px 5px 5px rgba(0,0,0,0.5));
        }

        .sub-invite { font-family: 'Cinzel', serif; letter-spacing: 4px; color: #fcf6ba; font-size: 1.1rem; margin-bottom: 10px; }

        /* Slideshow Fix */
        .slideshow-container {
            width: 85%; max-width: 1100px; height: 75vh;
            margin: 40px auto; position: relative;
            background: rgba(255,255,255,0.05); border: 2px solid #bf953f;
            border-radius: 5px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .mySlides { 
            display: none; width: 100%; height: 100%; 
            object-fit: contain; animation: slideFade 1.5s ease;
        }

        /* Royal Card Details */
        .details-container {
            width: 90%; max-width: 800px; margin: 50px auto;
            background: rgba(20, 20, 20, 0.8); padding: 60px 30px;
            border: 1px solid #bf953f; border-radius: 5px;
            box-shadow: 0 0 30px rgba(191, 149, 63, 0.2);
        }

        .details-container h3 { 
            font-family: 'Cinzel', serif; font-size: 3rem; 
            background: var(--royal-gold); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; margin: 0;
        }

        .section-title { 
            font-family: 'Parisienne', cursive; color: #fcf6ba; 
            font-size: 2.2rem; margin-top: 40px; 
        }

        .highlight-date { 
            font-family: 'Cinzel', serif; font-size: 2rem; 
            color: #fff; letter-spacing: 3px; margin: 15px 0;
        }
