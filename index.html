<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sai Kiran & Mounika Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>
:root { --gold:#D4AF37; --maroon:#600000; }

body {
    margin:0;
    font-family: 'Montserrat', sans-serif;
    background:black;
    overflow-x:hidden;
}

/* ENTRY */
#entry-gate {
    display:flex;
    height:100vh;
    position:fixed;
    width:100%;
    z-index:1000;
    transition:1.2s;
}

.side {
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    cursor:pointer;
    color:white;
}

.groom-side {
    background:url('https://i.postimg.cc/xqDj4NJr/Whats-App-Image-2026-04-14-at-9-56-48-PM.jpg') center/cover;
}

.bride-side {
    background:url('https://i.postimg.cc/grFcTLw1/Whats-App-Image-2026-04-14-at-9-56-49-PM-(1).jpg') center/cover;
}

.side h2 {
    font-family:'Great Vibes';
    font-size:4rem;
}

/* MAIN */
#main-content {
    display:none;
    opacity:0;
    text-align:center;
    padding-bottom:50px;
}

.header-box h1 {
    font-family:'Great Vibes';
    font-size:5rem;
    color:var(--gold);
}

/* SLIDES */
.slideshow-container {
    width:90%;
    max-width:900px;
    margin:auto;
}

.mySlides {
    display:none;
    width:100%;
}

/* BUTTON */
.btn {
    padding:10px 20px;
    border:1px solid gold;
    color:gold;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- 🔊 MUSIC -->
<audio id="bg-music" loop>
    <source src="https://files.catbox.moe/9lh049.mp3" type="audio/mpeg">
</audio>

<!-- ENTRY -->
<div id="entry-gate">
    <div class="side groom-side" onclick="enterInvite()">
        <h2>Sai Kiran</h2>
    </div>
    <div class="side bride-side" onclick="enterInvite()">
        <h2>Mounika</h2>
    </div>
</div>

<!-- MAIN -->
<div id="main-content">
    <div class="header-box">
        <h1>Sai Kiran ❤️ Mounika</h1>
        <p>Wedding Invitation</p>
    </div>

    <div class="slideshow-container">
        <img class="mySlides" src="https://picsum.photos/800/400">
        <img class="mySlides" src="https://picsum.photos/801/400">
        <img class="mySlides" src="https://picsum.photos/802/400">
    </div>

    <a class="btn" href="#">View Map</a>
</div>

<script>

// 🎬 ENTER + MUSIC
function enterInvite() {

    const music = document.getElementById("bg-music");

    // PLAY WITH FADE IN
    music.volume = 0;
    music.play().catch(() => {});

    let vol = 0;
    let fade = setInterval(() => {
        if (vol < 1) {
            vol += 0.05;
            music.volume = vol;
        } else {
            clearInterval(fade);
        }
    }, 200);

    // PAGE TRANSITION
    document.getElementById('entry-gate').style.transform = 'translateY(-100%)';
    document.getElementById('main-content').style.display = 'block';

    setTimeout(() => {
        document.getElementById('main-content').style.opacity = '1';
        startSlideshow();
    }, 500);
}

// 📸 SLIDESHOW
let slideIndex = 0;

function startSlideshow() {
    let slides = document.getElementsByClassName("mySlides");

    for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
    }

    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;

    slides[slideIndex - 1].style.display = "block";

    setTimeout(startSlideshow, 3000);
}

</script>

</body>
</html>
