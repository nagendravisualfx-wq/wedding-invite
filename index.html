<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #fdf5f5;
        }

        /* Hero Section with Parallax */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url(https://drive.google.com/file/d/190sOokDEK2Lqq4LTwqENNEAGl8EksFUp/view?usp=drive_link)"></div>
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            margin: 0;
            animation: fadeIn 3s ease-in;
        }

        /* Countdown Timer */
        .countdown {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        /* Story Section */
        .section {
            padding: 80px 20px;
            text-align: center;
            max-width: 800px;
            margin: auto;
        }

        .couple-pics {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 40px;
        }

        .photo-card {
            width: 300px;
            height: 400px;
            background-size: cover;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.5s;
        }

        .photo-card:hover {
            transform: scale(1.05);
        }

        /* Button Style */
        .btn {
            background: #e63946;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            margin-top: 30px;
            transition: 0.3s;
        }

        .btn:hover { background: #b91d2a; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Saikiran & Mounika</h1> <p>Are getting married!</p>
        
        <div class="countdown" id="timer">
            </div>
    </div>

    <div class="section">
        <h2 style="font-family: 'Great Vibes'; font-size: 3rem;">Save The Date</h2>
        <p>Manam korukunna kshanam raane vachindi. Ee veduka lo meeru undali ani korukuntunnam.</p>
        <p><strong>March 7th, 2026</strong></p>
        
        <div class="couple-pics">
            <div class="photo-card" style="background-image: url('https://drive.google.com/file/d/1bnflzF6p__IkHBi47WvzrHPHAcqIYDpc/view?usp=drive_link');"></div>
            <div class="photo-card" style="background-image: url('https://drive.google.com/file/d/1s8kO-ozb-44yh4ztW2x05nrCCiKldjPz/view?usp=drive_link');"></div>
        </div>

        <a href="https://maps.google.com" target="_blank" class="btn">View Location on Map</a>
    </div>

    <script>
        // Set the wedding date
        const weddingDate = new Date("May 3, 2026 07:14:00").getTime();

        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            document.getElementById("timer").innerHTML = `
                <div class="time-box"><h3>${days}</h3><p>Days</p></div>
                <div class="time-box"><h3>${hours}</h3><p>Hours</p></div>
            `;
        }, 1000);
    </script>
</body>
</html>
